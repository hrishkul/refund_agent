services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: worknoon
      POSTGRES_PASSWORD: worknoon
      POSTGRES_DB: refund_agent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worknoon"]
      interval: 5s
      timeout: 5s
      retries: 5

  langfuse:
    image: langfuse/langfuse:2
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://worknoon:worknoon@db:5432/refund_agent
      NEXTAUTH_SECRET: worknoon-nextauth-secret
      SALT: worknoon-salt
      NEXTAUTH_URL: http://localhost:3000
      LANGFUSE_INIT_ORG_ID: worknoon-local
      LANGFUSE_INIT_ORG_NAME: Worknoon Local
      LANGFUSE_INIT_PROJECT_ID: worknoon-refund-agent
      LANGFUSE_INIT_PROJECT_NAME: worknoon-refund-agent
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: lf_pk_worknoon_refund_agent_local
      LANGFUSE_INIT_PROJECT_SECRET_KEY: lf_sk_worknoon_refund_agent_local
      LANGFUSE_INIT_USER_EMAIL: admin@worknoon.local
      LANGFUSE_INIT_USER_NAME: Admin
      LANGFUSE_INIT_USER_PASSWORD: worknoon-admin
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://' + require('os').hostname() + ':3000/api/public/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 18

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      LANGFUSE_PUBLIC_KEY: lf_pk_worknoon_refund_agent_local
      LANGFUSE_SECRET_KEY: lf_sk_worknoon_refund_agent_local
      LANGFUSE_HOST: http://langfuse:3000
    depends_on:
      db:
        condition: service_healthy
      langfuse:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
